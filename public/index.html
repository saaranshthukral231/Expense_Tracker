<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Personal Finance</p>
            <h1>Expense Tracker</h1>
            <p class="panel-copy">
              Record expenses and keep the current view accurate even if requests are retried.
            </p>
          </div>
          <div class="total-card">
            <span class="total-label">Current total</span>
            <strong id="totalAmount">₹0.00</strong>
          </div>
        </div>

        <div id="statusBanner" class="status-banner hidden" role="status" aria-live="polite"></div>

        <form id="expenseForm" class="expense-form" novalidate>
          <div class="field-grid">
            <label class="field">
              <span>Amount</span>
              <input
                id="amountInput"
                name="amount"
                type="text"
                inputmode="decimal"
                placeholder="0.00"
                autocomplete="off"
                required
              />
            </label>

            <label class="field">
              <span>Category</span>
              <input
                id="categoryInput"
                name="category"
                type="text"
                maxlength="50"
                placeholder="Groceries"
                required
              />
            </label>

            <label class="field field-wide">
              <span>Description</span>
              <input
                id="descriptionInput"
                name="description"
                type="text"
                maxlength="200"
                placeholder="Weekly vegetable run"
                required
              />
            </label>

            <label class="field">
              <span>Date</span>
              <input id="dateInput" name="date" type="date" required />
            </label>
          </div>

          <div class="form-actions">
            <button id="submitButton" class="primary-button" type="submit">Save expense</button>
            <button id="retryButton" class="secondary-button hidden" type="button">Retry pending save</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="toolbar">
          <label class="field toolbar-field">
            <span>Filter by category</span>
            <select id="categoryFilter">
              <option value="">All categories</option>
            </select>
          </label>

          <label class="field toolbar-field">
            <span>Sort</span>
            <select id="sortSelect">
              <option value="date_desc">Date: newest first</option>
              <option value="">Created order</option>
            </select>
          </label>
        </div>

        <div id="listState" class="list-state" role="status" aria-live="polite"></div>

        <div class="table-wrap">
          <table class="expense-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th class="amount-column">Amount</th>
              </tr>
            </thead>
            <tbody id="expenseRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
